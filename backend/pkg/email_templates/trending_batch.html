<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SeeqMe Trending</title>
<style>
    body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border: 1px solid #e5e7eb; border-radius: 24px; overflow: hidden; }
    .header { padding: 30px; text-align: center; border-bottom: 1px solid #f1f5f9; }
    .post { padding: 20px; border-bottom: 1px solid #f1f5f9; }
    .author { font-weight: 800; font-size: 14px; color: #0f172a; margin-bottom: 4px; }
    .content { font-size: 14px; color: #475569; line-height: 1.5; }
    .btn { display: block; text-align: center; background: #0f766e; color: #fff !important; padding: 12px; margin: 20px; border-radius: 12px; text-decoration: none; font-weight: 700; }
    .footer { padding: 20px; text-align: center; color: #94a3b8; font-size: 11px; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://seeqme.com/seeqme-logo-black.png" alt="SeeqMe" style="height: 24px; margin-bottom: 10px;" />
        <h2 style="margin: 0; color: #0f172a;">Mesh Highlights</h2>
        <p style="margin: 5px 0 0; color: #64748b; font-size: 13px;">Catch up on what's buzzing in your network</p>
    </div>
    
    {{range .Posts}}
    <div class="post">
        <div class="author">{{.Author}}</div>
        <div class="content">{{.Content}}</div>
        <div style="font-size: 11px; color: #94a3b8; margin-top: 8px;">❤️ {{.Likes}} likes · 💬 {{.Comments}} comments</div>
    </div>
    {{end}}

    <a href="https://seeqme.com/feed" class="btn">Jump into the Feed</a>

    <div class="footer">
        <p>You received this because you're part of the SeeqMe network.</p>
        <p>&copy; {{.Year}} SeeqMe. All rights reserved.</p>
    </div>
</div>
</body>
</html>
