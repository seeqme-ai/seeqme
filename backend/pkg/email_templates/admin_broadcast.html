<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message from SeeqMe</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #f8fafc;
        color: #334155;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .hero {
        padding: 36px 40px 28px;
        text-align: center;
        background-color: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .logo {
        height: 40px;
        margin-bottom: 20px;
    }

    .logo-dark {
        display: none;
    }

    h1 {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
        margin: 0;
        letter-spacing: -0.02em;
    }

    .highlight {
        color: #0f766e;
    }

    .content {
        padding: 36px 40px;
    }

    p {
        font-size: 15px;
        line-height: 1.65;
        margin-bottom: 20px;
        color: #475569;
    }

    .message-card {
        background-color: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 22px;
        margin-bottom: 24px;
    }

    .message-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #0f766e;
        display: block;
        margin-bottom: 8px;
    }

    .message-body {
        font-size: 15px;
        color: #0f172a;
        line-height: 1.6;
    }

    .cta {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 20px;
        background-color: #0f766e;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
    }

    .footer {
        padding: 28px;
        text-align: center;
        background-color: #f9fafb;
        border-top: 1px solid #e5e7eb;
    }

    .footer p {
        font-size: 12px;
        color: #94a3b8;
        margin: 0;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
        body {
            background-color: #020617;
            color: #cbd5e1;
        }

        .container {
            background-color: #020617;
            border-color: #1e293b;
            box-shadow: none;
        }

        .hero,
        .footer {
            background-color: #020617;
            border-color: #1e293b;
        }

        h1 {
            color: #e5e7eb;
        }

        p {
            color: #cbd5e1;
        }

        .message-card {
            background-color: #020617;
            border-color: #1e293b;
        }

        .message-title {
            color: #14b8a6;
        }

        .message-body {
            color: #e5e7eb;
        }

        .cta {
            background-color: #14b8a6;
        }

        .footer p {
            color: #64748b;
        }

        .logo-light {
            display: none !important;
        }

        .logo-dark {
            display: inline-block !important;
        }
    }
</style>
</head>

<body>
<div class="container">
    <div class="hero">
        <!-- Light logo -->
        <img src="https://seeqme.com/seeqme-logo-black.png" alt="SeeqMe" class="logo logo-light" />
        <!-- Dark logo -->
        <img src="https://seeqme.com/seeqme-logo-white.png" alt="SeeqMe" class="logo logo-dark" />

        <h1>Message <span class="highlight">Update</span></h1>
    </div>

    <div class="content">
        <p>Hi {{.FullName}},</p>

        <div class="message-card">
            <span class="message-title">{{.MessageTitle}}</span>
            <div class="message-body">
                {{.MessageBody}}
            </div>
        </div>

        {{if .CtaUrl}}
        <a class="cta" href="{{.CtaUrl}}">{{.CtaLabel}}</a>
        {{end}}

        {{if .FooterNote}}
        <p style="margin-top: 28px; font-size: 14px; color: #64748b;">{{.FooterNote}}</p>
        {{end}}
    </div>

    <div class="footer">
        <p>&copy; {{.Year}} SeeqMe. All rights reserved.</p>
    </div>
</div>
</body>
</html>
