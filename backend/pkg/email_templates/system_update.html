<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Announcement from SeeqMe</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #f8fafc;
        color: #334155;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .hero {
        padding: 36px 40px 28px;
        text-align: center;
        background-color: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .logo {
        height: 40px;
        margin-bottom: 20px;
    }

    .logo-dark {
        display: none;
    }

    h1 {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
        margin: 0;
        letter-spacing: -0.02em;
    }

    .highlight {
        color: #0f766e;
    }

    .content {
        padding: 30px 28px;
    }

    p {
        font-size: 15px;
        line-height: 1.65;
        margin-bottom: 20px;
        color: #475569;
    }

    .update-card {
        background-color: transparent;
        border: none;
        border-radius: 0;
        padding: 0;
        margin: 0 0 20px;
    }

    .update-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #0f766e;
        display: block;
        margin-bottom: 10px;
    }

    .update-content {
        font-size: 15px;
        color: #0f172a;
        line-height: 1.75;
    }

    .footer {
        padding: 28px;
        text-align: center;
        background-color: #f9fafb;
        border-top: 1px solid #e5e7eb;
    }

    .footer p {
        font-size: 12px;
        color: #94a3b8;
        margin: 0;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
        body {
            background-color: #020617;
            color: #cbd5e1;
        }

        .container {
            background-color: #020617;
            border-color: #1e293b;
            box-shadow: none;
        }

        .hero,
        .footer {
            background-color: #020617;
            border-color: #1e293b;
        }

        h1 {
            color: #e5e7eb;
        }

        p {
            color: #cbd5e1;
        }

        .update-card {
            background-color: transparent;
            border: none;
        }

        .update-title {
            color: #14b8a6;
        }

        .update-content {
            color: #e5e7eb;
        }

        .footer p {
            color: #64748b;
        }

        .logo-light {
            display: none !important;
        }

        .logo-dark {
            display: inline-block !important;
        }
    }
</style>
</head>

<body>
<div class="container">
    <div class="hero">
        <!-- Light logo -->
        <img src="https://seeqme.com/seeqme-logo-black.png" alt="SeeqMe" class="logo logo-light" />
        <!-- Dark logo -->
        <img src="https://seeqme.com/seeqme-logo-white.png" alt="SeeqMe" class="logo logo-dark" />

        <h1>Exciting <span class="highlight">Update</span></h1>
    </div>

    <div class="content">
        <p>Hi {{.FullName}}, we've got some news to share about SeeqMe!</p>

        <div class="update-card">
            <span class="update-title">{{.UpdateTitle}}</span>
            <div class="update-content">
                {{.UpdateContent}}
            </div>
        </div>

        <p style="margin-top: 32px; font-size: 14px; color: #64748b;">
            We're always working to make SeeqMe better for you. If you have any questions, feel free to reach out!
        </p>
    </div>

    <div class="footer">
        <p>&copy; {{.Year}} SeeqMe. All rights reserved.</p>
    </div>
</div>
</body>
</html>
